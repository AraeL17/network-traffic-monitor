worker_processes 1;
pid /home/easton/project/Network_Traffic_Project/nginx-runtime/logs/nginx.pid;
error_log /home/easton/project/Network_Traffic_Project/nginx-runtime/logs/error.log;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /home/easton/project/Network_Traffic_Project/nginx-runtime/logs/access.log;
    error_log /home/easton/project/Network_Traffic_Project/nginx-runtime/logs/error.log;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name localhost;

        root /home/easton/project/Network_Traffic_Project/dist;
        index index.html;

        # React 单页应用路由回退，避免刷新页面出现 404
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Vite 构建后的 hash 静态资源可长期缓存
        location /assets/ {
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 后续真实后端接入时，把 Flask/FastAPI 跑在 8000 端口即可启用此代理
        # location /api/ {
        #     proxy_pass http://127.0.0.1:8000;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
    }
}
